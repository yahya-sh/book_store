{% extends 'book_outlet/base.html' %}

{% block title %}
  All Books
{% endblock %}
{% block content %}
  <h1>All Books</h1>
  <ul>
    {% for book in book_list %}
      <li>
        <a href="{{ book.get_absolute_url }}">
          <p>
            <strong>{{ book.title }}</strong>
          </p>
        </a>
        <p>{{ book.author }}</p>
        <p>
          <small>Rating: {{ book.rating }} of 5</small>
        </p>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
